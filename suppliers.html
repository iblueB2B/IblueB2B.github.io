<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Suppliers - iBlue B2B</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Swiper CSS for Carousels -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/suppliers.css">
</head>
<body>
    <!-- Simple Header -->
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-circle">i</div>
                <span class="logo-text">iBlue<span>B2B</span></span>
            </a>
            
            <button class="search-toggle" id="searchToggle">
                <i class="fas fa-search"></i>
            </button>
        </div>
        
        <!-- Search Bar (Hidden by default) -->
        <div class="search-bar" id="searchBar">
            <input type="text" placeholder="Search suppliers..." id="searchInput">
            <button class="search-close" id="searchClose"><i class="fas fa-times"></i></button>
        </div>
    </header>

    <!-- Banner Carousel -->
    <section class="banner-carousel">
        <div class="swiper banner-swiper">
            <div class="swiper-wrapper" id="bannerWrapper">
                <!-- Populated by JS -->
                <div class="swiper-slide banner-loading">
                    <div class="spinner"></div>
                </div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </section>

    <!-- Hot Suppliers Carousel -->
    <section class="hot-suppliers">
        <div class="section-header">
            <h2><i class="fas fa-fire" style="color: #F59E0B;"></i> Hot Suppliers</h2>
            <a href="supplier-results.html?filter=hot" class="view-all">View All <i class="fas fa-arrow-right"></i></a>
        </div>
        
        <div class="hot-suppliers-carousel">
            <div class="swiper hot-swiper">
                <div class="swiper-wrapper" id="hotSuppliersWrapper">
                    <!-- Populated by JS -->
                    <div class="swiper-slide">
                        <div class="hot-supplier-card loading-card">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
        </div>
    </section>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All Suppliers</button>
            <button class="filter-tab" data-filter="verified">Verified Only</button>
            <button class="filter-tab" data-filter="featured">Featured</button>
        </div>
        
        <div class="filter-sort">
            <select id="sortSelect">
                <option value="recommended">Recommended</option>
                <option value="rating">Highest Rated</option>
                <option value="orders">Most Orders</option>
                <option value="newest">Newest</option>
            </select>
        </div>
    </div>

    <!-- Suppliers Grid -->
    <main class="suppliers-grid" id="suppliersGrid">
        <!-- Populated by JS -->
        <div class="loading-grid">
            <div class="spinner"></div>
            <p>Loading suppliers...</p>
        </div>
    </main>

    <!-- Load More Button -->
    <div class="load-more">
        <button class="load-more-btn" id="loadMoreBtn">Load More Suppliers</button>
    </div>

    <!-- Simple Footer -->
    <footer class="footer">
        <p>&copy; 2026 iBlue B2B. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/suppliers.js"></script>
</body>
</html>
