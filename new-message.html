<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>New Message - iBlue B2B</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0B4F6C;
            --primary-dark: #083b4f;
            --primary-light: #1a6b8a;
            --secondary: #10B981;
            --accent: #F59E0B;
            --danger: #EF4444;
            --dark: #1F2937;
            --gray-800: #1F2937;
            --gray-700: #374151;
            --gray-600: #4B5563;
            --gray-500: #6B7280;
            --gray-400: #9CA3AF;
            --gray-300: #D1D5DB;
            --gray-200: #E5E7EB;
            --gray-100: #F3F4F6;
            --white: #FFFFFF;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--gray-100);
            color: var(--dark);
            line-height: 1.4;
            padding-bottom: 70px;
        }

        .header {
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--gray-600);
            cursor: pointer;
            padding: 8px;
            margin: -8px;
        }

        .back-btn:hover {
            color: var(--primary);
        }

        .header-title {
            flex: 1;
            font-size: 18px;
            font-weight: 600;
            color: var(--dark);
        }

        .main-content {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: var(--white);
            padding: 12px;
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
            overflow-x: auto;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            color: var(--gray-600);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .tab-btn i {
            margin-right: 6px;
        }

        /* Search Section */
        .search-section {
            background: var(--white);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--gray-200);
        }

        .search-box {
            position: relative;
            margin-bottom: 16px;
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
        }

        .search-box input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius);
            font-size: 15px;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 8px 16px;
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip:hover {
            border-color: var(--primary);
            background: #EFF6FF;
        }

        .filter-chip.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Results Grid */
        .results-grid {
            display: grid;
            gap: 12px;
        }

        .result-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .result-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            overflow: hidden;
        }

        .result-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-info {
            flex: 1;
        }

        .result-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 2px;
        }

        .result-meta {
            font-size: 12px;
            color: var(--gray-500);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .verified-badge {
            color: var(--secondary);
            font-size: 12px;
        }

        .result-details {
            padding-top: 12px;
            border-top: 1px solid var(--gray-200);
            font-size: 13px;
            color: var(--gray-600);
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .detail-item i {
            width: 16px;
            color: var(--primary);
        }

        /* Context Section */
        .context-section {
            margin: 16px 0;
            padding: 16px;
            background: var(--gray-100);
            border-radius: var(--radius);
        }

        .context-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 12px;
        }

        .context-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .context-option {
            padding: 16px;
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .context-option:hover {
            border-color: var(--primary);
            background: #EFF6FF;
        }

        .context-option i {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .context-option span {
            display: block;
            font-weight: 600;
            font-size: 14px;
        }

        .context-option small {
            display: block;
            color: var(--gray-500);
            font-size: 11px;
            margin-top: 4px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray-500);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state i {
            font-size: 48px;
            color: var(--gray-300);
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 18px;
            color: var(--gray-700);
            margin-bottom: 8px;
        }

        .empty-state p {
            color: var(--gray-500);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            border-top: 1px solid var(--gray-200);
            display: flex;
            padding: 8px 0 12px;
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--gray-400);
            font-size: 11px;
            gap: 4px;
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item.active {
            color: var(--primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 14px;
            text-align: center;
            z-index: 3000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            max-width: 400px;
            margin: 0 auto;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 480px) {
            .context-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-top">
            <button class="back-btn" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="header-title">New Message</div>
            <div style="width: 40px;"></div>
        </div>
    </header>

    <main class="main-content">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="direct">
                <i class="fas fa-user"></i> Direct Message
            </button>
            <button class="tab-btn" data-tab="inquiry">
                <i class="fas fa-file-invoice"></i> From Inquiry
            </button>
            <button class="tab-btn" data-tab="quote">
                <i class="fas fa-file-invoice"></i> From Quote
            </button>
            <button class="tab-btn" data-tab="order">
                <i class="fas fa-clipboard-list"></i> From Order
            </button>
        </div>

        <!-- Direct Message Tab -->
        <div class="tab-content active" id="tab-direct">
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="userSearch" placeholder="Search by name or business...">
                </div>
                <div class="filters" id="userFilters">
                    <span class="filter-chip active" data-filter="all">All</span>
                    <span class="filter-chip" data-filter="buyers">Buyers</span>
                    <span class="filter-chip" data-filter="suppliers">Suppliers</span>
                    <span class="filter-chip" data-filter="verified">Verified Only</span>
                </div>
            </div>

            <div id="userResults" class="results-grid">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Inquiry Tab -->
        <div class="tab-content" id="tab-inquiry">
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="inquirySearch" placeholder="Search by inquiry number or title...">
                </div>
            </div>

            <div id="inquiryResults" class="results-grid">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Quote Tab -->
        <div class="tab-content" id="tab-quote">
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="quoteSearch" placeholder="Search by quote number...">
                </div>
            </div>

            <div id="quoteResults" class="results-grid">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Order Tab -->
        <div class="tab-content" id="tab-order">
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="orderSearch" placeholder="Search by order number...">
                </div>
            </div>

            <div id="orderResults" class="results-grid">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Quick Context Options -->
        <div class="context-section">
            <div class="context-title">Quick Start</div>
            <div class="context-options">
                <div class="context-option" onclick="window.location.href='send-inquiry.html'">
                    <i class="fas fa-plus-circle"></i>
                    <span>New Inquiry</span>
                    <small>Send bulk inquiry to suppliers</small>
                </div>
                <div class="context-option" onclick="window.location.href='suppliers.html'">
                    <i class="fas fa-warehouse"></i>
                    <span>Browse Suppliers</span>
                    <small>Find verified suppliers</small>
                </div>
                <div class="context-option" onclick="window.location.href='orders.html'">
                    <i class="fas fa-clipboard-list"></i>
                    <span>My Orders</span>
                    <small>Discuss existing orders</small>
                </div>
                <div class="context-option" onclick="window.location.href='my-inquiries.html'">
                    <i class="fas fa-file-invoice"></i>
                    <span>My Inquiries</span>
                    <small>Continue negotiations</small>
                </div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="suppliers.html" class="nav-item">
            <i class="fas fa-warehouse"></i>
            <span>Suppliers</span>
        </a>
        <a href="my-inquiries.html" class="nav-item">
            <i class="fas fa-file-invoice"></i>
            <span>Inquiries</span>
        </a>
        <a href="orders.html" class="nav-item">
            <i class="fas fa-clipboard-list"></i>
            <span>Orders</span>
        </a>
        <a href="chat.html" class="nav-item active">
            <i class="fas fa-comment"></i>
            <span>Chat</span>
        </a>
    </nav>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/new-message.js"></script>
</body>
</html>
